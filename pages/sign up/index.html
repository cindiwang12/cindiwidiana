<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="/style/reset.css">
    <link rel="stylesheet" href="/style/main.css">
    <link rel="stylesheet" href="/style/component.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<main>

        <section class="auth-section">

            <div class="auth-card">
                <h2>Daftar Akun</h2>
        
                <form id="signupForm">
        
                    <label>Nama</label>
                    <input type="text" id="nama" placeholder="Nama lengkap" required>
        
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Email aktif" required>
        
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Buat password" required>
        
                    <button type="submit">Daftar</button>
        
                </form>
        
                <p class="auth-link">
                    Sudah punya akun? <a href="login.html">Login</a>
                </p>
            </div>
        
    
    </section>
</main>

<script src="/script/function.js"></script>
</body>

</html>
